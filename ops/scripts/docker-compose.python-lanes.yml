version: "3.9"

services:
services:
  storage-lane:
    build:
      context: ../../
      dockerfile: lane-storage/python-storage/Dockerfile
    environment:
      ENV: dev
      STORAGE_BASE_URL: http://storage-lane:8102
    ports:
      - "8102:8102"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8102/docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  agentic-core-lane:
    build:
      context: ../../
      dockerfile: lane-agentic-core/python-agentic-core/Dockerfile
    environment:
      ENV: dev
      STORAGE_BASE_URL: http://storage-lane:8102
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      storage-lane:
        condition: service_healthy
    ports:
      - "8101:8101"

  api-gateway-lane:
    build:
      context: ../../
      dockerfile: lane-api-gateway/python-api-gateway/Dockerfile
    environment:
      ENV: dev
      AGENTIC_CORE_BASE_URL: http://agentic-core-lane:8101
      STORAGE_BASE_URL: http://storage-lane:8102
      STRICT_AUTH: "false"
      DEV_BEARER_TOKEN: "dev-token-secret-123"
    depends_on:
      agentic-core-lane:
        condition: service_started
    ports:
      - "8100:8100"
