version: "3.9"

services:
  storage-lane:
    image: python:3.11-slim
    working_dir: /workspace/lane-storage/python-storage
    volumes:
      - ../../:/workspace
    command: >
      sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8102"
    ports:
      - "8102:8102"

  agentic-core-lane:
    image: python:3.11-slim
    working_dir: /workspace/lane-agentic-core/python-agentic-core
    volumes:
      - ../../:/workspace
    environment:
      STORAGE_BASE_URL: http://storage-lane:8102
    command: >
      sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8101"
    depends_on:
      - storage-lane
    ports:
      - "8101:8101"

  api-gateway-lane:
    image: python:3.11-slim
    working_dir: /workspace/lane-api-gateway/python-api-gateway
    volumes:
      - ../../:/workspace
    environment:
      AGENTIC_CORE_BASE_URL: http://agentic-core-lane:8101
      STORAGE_BASE_URL: http://storage-lane:8102
      STRICT_AUTH: "false"
    command: >
      sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8100"
    depends_on:
      - storage-lane
      - agentic-core-lane
    ports:
      - "8100:8100"
